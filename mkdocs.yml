site_name: Coronagraph
repo_url: https://github.com/yourusername/coronagraph

theme:
  name: material
  features:
    - navigation.tabs
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            members_order: source
            filters:
              - "!^_"    # hide private/dunder methods
              - "^__init__"  # but show __init__

nav:
  - Home: index.md
  - API Reference: api.md
